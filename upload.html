        <h1>UPLOAD YOUR SIGHTING</h1>
        <div class="upload-form">
            <form action="submit_sighting.php" method="post" enctype="multipart/form-data">
                
                <input type="text" id="name" name="name" required  placeholder="Enter your name"><br><br>

                
                <input type="text" id="location" name="location" required placeholder="Enter the location"><br><br>
                
                <input type="date" id="time" name="time" required><br><br>
                
                <textarea id="description" name="description" required placeholder="Enter a description of the sighting"></textarea><br><br>

                
                <input type="file" id="image" name="image" accept="image/*"><br><br>

                <input type="submit" value="Submit Sighting">
            </form>
        

    </body>
